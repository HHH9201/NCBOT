title: "NCBOT 帮助中心"
subtitle: "常用命令一图速览"
description: "发送 帮助 / 菜单 / help 即可再次查看"
footer: "Tips: 部分命令仅管理员可用，具体以群权限配置为准"
aliases:
  - "帮助"
  - "菜单"
  - "help"
  - "Help"
sections:
  - title: "资源搜索"
    accent: "#7C5CFF"
    items:
      - command: "搜库 游戏名"
        desc: "优先从本地资源库搜索，速度快"
      - command: "搜网 游戏名"
        desc: "从资源站搜索并同步收录"
      - command: "搜索 游戏名"
        desc: "综合搜索入口，适合日常使用"
  - title: "邮箱工具"
    accent: "#23C6B8"
    items:
      - command: "给一个账号"
        desc: "快速领取 1 个 Trae 邮箱账号"
      - command: "给N个账号"
        desc: "单次最多 20 个，按需批量领取"
      - command: "账号统计"
        desc: "查看邮箱总数、已分配和未分配数量"
  - title: "数据查询"
    accent: "#FFB84D"
    items:
      - command: "史低 游戏名"
        desc: "查询 Steam 游戏历史最低价格"
      - command: "steam 游戏名"
        desc: "与史低同义，支持英文指令"
      - command: "当前额度"
        desc: "查看当前可用资源额度"
  - title: "管理命令"
    accent: "#FF6B8A"
    items:
      - command: "查询今日人数"
        desc: "查看小程序今日新增用户数"
      - command: "123456修改为654321"
        desc: "修改 6 位虚拟 ID"
      - command: "123456增加上限10个"
        desc: "给指定虚拟 ID 增加奖励额度"

