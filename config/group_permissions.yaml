# 群聊功能权限配置
# 支持按群号配置每个插件的开关

# 默认配置（对所有群生效，除非被特定群配置覆盖）
default:
  # 插件开关
  plugins:
    ai_chat: true        # AI 对话插件 - @机器人自动回复
    xydj: true           # 游戏搜索插件 - 搜索游戏资源
    welcome: true        # 欢迎插件 - 成员加群欢迎、退群告别
    txt: true            # 文档查询插件 - 关键词查询文档
    help: true           # 帮助插件 - 显示帮助信息
    epic: true           # Epic 喜加一插件 - 获取 Epic 免费游戏
    steam: true          # Steam 价格监控插件
    resource_collector: false  # 资源收集插件 - 默认关闭
    trae_stats: false    # Trae 额度统计 - 默认关闭，仅在指定群开启

# 特定群配置（优先级高于 default）
groups:
  # 测试群（695934967）- 开启所有功能
  "695934967":
    plugins:
      ai_chat: true
      xydj: true
      welcome: false
      txt: true
      help: true
      epic: true
      steam: true
      resource_collector: true
      trae_stats: true
      help_center: true

  # 仅允许在该群使用 Trae 额度统计
  "894356872":
    plugins:
      txt: false
      trae_stats: false

  # 资源收集群 (864170514) - 只保留静默收集功能，禁用所有互动命令和回复
  "864170514":
    plugins:
      ai_chat: false
      xydj: false
      welcome: false
      txt: false
      help: false
      help_center: false
      epic: false
      steam: false
      resource_collector: true
      trae_stats: false
      trae_analytics: false
      trae_admin: false
      trae-email: false
      crawler_notifier: false
      welcome: false

# 黑名单群（完全禁用机器人）
blacklist: []

# 白名单群（只有这些群可以使用，如果为空则对所有群生效）
whitelist: []
